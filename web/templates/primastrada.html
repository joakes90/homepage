<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  a { color: #6b5a44; text-decoration: underline; }
  a:hover { color: #9c7a3c; }
</style>
</helmet>

<div style="position: relative; width: 100%; min-height: 100vh; background: #f4ecdd; overflow: hidden; font-family: 'EB Garamond', Georgia, serif; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; padding: 48px 24px;">

  <div style="position: absolute; inset: 0; opacity: 0.05; mix-blend-mode: multiply; pointer-events: none; background-image: url(&quot;data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>&quot;);"></div>

  <div style="position: absolute; inset: 14px; border: 1px solid #c9b48c; pointer-events: none;"></div>
  <div style="position: absolute; inset: 20px; border: 1px solid #c9b48c; opacity: 0.5; pointer-events: none;"></div>

  <div style="position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; max-width: 640px;">

    <div style="font-family: 'EB Garamond', serif; font-size: 13px; letter-spacing: 0.35em; color: #9c7a3c; text-transform: uppercase; margin-bottom: 28px;">Tecnologie Automobilistiche</div>

    <h1 style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500; font-size: clamp(48px, 9vw, 88px); color: #3a2c1e; margin: 0; line-height: 1;">PrimaStrada</h1>

    <sc-if value="true" hint-placeholder-val="true">
      <div style="display: flex; align-items: center; gap: 14px; margin: 26px 0;">
        <div style="width: 60px; height: 1px; background: #c9b48c;"></div>
        <div style="width: 7px; height: 7px; background: #9c7a3c; transform: rotate(45deg);"></div>
        <div style="width: 60px; height: 1px; background: #c9b48c;"></div>
      </div>
    </sc-if>

    <p style="font-family: 'EB Garamond', serif; font-style: italic; font-size: clamp(18px, 2.6vw, 23px); color: #4a3c2a; line-height: 1.5; max-width: 480px; margin: 0 0 34px;">Software for world-class automobiles and motorbikes</p>

    <div style="border: 1px solid #c9b48c; padding: 10px 26px; font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: #6b5a44;">Coming Soon</div>

  </div>

  <div style="position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; font-size: 12px; letter-spacing: 0.08em; color: #a8987a;">© 2026 PrimaStrada Tecnologie. All rights reserved.</div>

</div>
</body>
</html>
